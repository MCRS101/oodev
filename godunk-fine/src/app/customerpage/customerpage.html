<div class="page-container">
  <header class="header">
    <h1>ข้อมูลการขาย (จากลูกค้า)</h1>
    <button class="profile-btn">
      <span class="avatar">👤</span> เจ้าหน้าที่การเงิน
    </button>
  </header>

  <div class="content-card">
    <div class="card-header">
      <h2 class="card-title">รายการรับเงินจากลูกค้า (Accounts Receivable)</h2>
      <button class="btn-export">
        <span class="icon">📥</span> Export Excel
      </button>
    </div>

    <table class="data-table">
      <thead>
        <tr>
          <th>รหัสใบสั่งซื้อ (Order ID)</th>
          <th>วันที่</th>
          <th>ชื่อลูกค้า (Customer)</th>
          <th>ยอดเงินที่ต้องรับ</th>
          <th>สถานะการโอน</th>
          <th>จัดการ</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let order of orders">

          <td>{{ order.id }}</td>

          <td>{{ order.createdAt | date:'dd/MM/yyyy HH:mm' }}</td>

          <td>ลูกค้ารหัส: {{ order.userId }}</td>

          <td style="color: #28a745; font-weight: bold;">฿ {{ order.total | number }}</td>

          <td>
            <span
              style="background-color: #ffc107; color: #000; padding: 5px 10px; border-radius: 20px; font-size: 0.85em;">รอการโอน</span>
          </td>

          <td>
            <button
              style="background-color: #0d6efd; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer;">ยืนยันรับยอด</button>
          </td>

        </tr>
      </tbody>
    </table>
  </div>
</div>
