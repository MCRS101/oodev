<div class="d-flex justify-content-center align-items-center vh-100 bg-secondary bg-opacity-25">

  <div class="card border-0 shadow-sm p-4" style="width:420px; border-radius:20px;">

    <h3 class="text-center fw-bold text-primary mb-4">
      สมัครบัญชีผู้ใช้งาน
    </h3>

    <form>

      <div class="mb-3">
        <label class="form-label">ชื่อ-นามสกุล</label>
        <input 
        type="text" 
        class="form-control"
        [(ngModel)]="name"
        name="name">
      </div>

      <div class="mb-3">
        <label class="form-label">อีเมล</label>
        <input 
        type="email" 
        class="form-control"
        [(ngModel)]="email"
        name="email">
      </div>

      <div class="mb-3">
        <label class="form-label">รหัสผ่าน</label>
        <input 
        type="password" 
        class="form-control"
        [(ngModel)]="password"
        name="password">
      </div>

      <div class="mb-4">
        <label class="form-label">ยืนยันรหัสผ่าน</label>
        <input 
        type="password" 
        class="form-control"
        [(ngModel)]="confirmPassword"
        name="confirmPassword">
      </div>

      <div class="text-center">
        <button 
        type="button"
        class="btn btn-primary rounded-pill px-4"
        (click)="register()">
          สร้างบัญชีผู้ใช้
        </button>
      </div>

      <p class="text-center mt-3 mb-0">
        มีบัญชีอยู่แล้ว?
        <a routerLink="/">เข้าสู่ระบบ</a>
      </p>

    </form>

  </div>

</div>
