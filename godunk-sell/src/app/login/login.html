<div class="vh-100 d-flex justify-content-center align-items-center  bg-opacity-25" style="background-color: #E7E7E7;">

  <div class="card shadow-lg border-0 p-4" style="width:480px; border-radius:20px; background:#ffffff;">

    <h3 class="text-center fw-bold mb-4 text-primary">
      เข้าสู่ระบบ
    </h3>

    <form (submit)="$event.preventDefault()">

      <div class="mb-3">
        <label class="form-label">อีเมล</label>
        <input
          type="email"
          class="form-control"
          [(ngModel)]="email"
          name="email">
      </div>

      <div class="mb-2">
        <label class="form-label">รหัสผ่าน</label>
        <input
          type="password"
          class="form-control"
          [(ngModel)]="password"
          name="password">
      </div>

      <div class="text-end mb-3">
        <a  href="/" class="small" (click)="openvideo()">ลืมรหัสผ่าน?</a>
      </div>

      <div class="d-grid">
        <button class="btn btn-primary rounded-pill" (click)="login()">
          เข้าสู่ระบบ
        </button>
      </div>

      <div class="text-center mt-4">
        <span class="text-muted">ยังไม่มีบัญชีใช่หรือไม่?</span>
        <a routerLink="/register">สมัครสมาชิก</a>
      </div>

    </form>

  </div>

</div>
