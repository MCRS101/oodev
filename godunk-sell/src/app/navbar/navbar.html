<nav class="d-flex container-fluid navbar bg-body-tertiary">
  <div>

  </div>
  <div class="container-fluid position-relative">
    <a class="navbar-brand"></a>
    <form class="d-flex position-absolute top-50 start-50 translate-middle" (submit)="$event.preventDefault()">

      <input class="form-control me-2" type="search" name="search" placeholder="Search" [(ngModel)]="searchText" />

      <button class="btn btn-outline-success" (click)="search()">
        Search
      </button>

    </form>
    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit" data-bs-toggle="modal"
        data-bs-target="#cartModal">ตระกร้าสินค้า🛒({{cartService.getCart().length}})</button>
      <button class="btn btn-primary" type="submit">ประวัติการสั่งซื้อ</button>
      <span *ngIf="user">
        👤 {{user.name}}
      </span>
      <a class="navbar-brand" href="#"></a>
      <img src="imgsrc/icon.jpg" alt="Logo" width="45" height="40" class="d-flex align-text-top">
      <button class="btn btn-danger btn-sm" (click)="logout()">
        Logout
      </button>
    </div>

  </div>

</nav>
<div class="modal fade" id="cartModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">🛒 ตระกร้าสินค้า</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="mt-4">

        <label class="form-label">ที่อยู่จัดส่ง</label>

        <h5 class="form-control">
          {{location}}
        </h5>

      </div>
      <div class="modal-body">

        <div *ngIf="cartService.getCart().length === 0">
          ไม่มีสินค้าในตะกร้า
        </div>

        <div *ngFor="let item of cartService.getCart()" class="d-flex align-items-center border-bottom pb-3 mb-3">

          <img [src]="item.image" width="70" class="me-3">

          <div class="grow">
            <h6>{{item.name}}</h6>
            <p class="text-success">{{item.price}} บาท</p>
          </div>

          <div class="d-flex align-items-center gap-3 m-4">

            <button class="btn btn-sm btn-outline-secondary" (click)="decrease(item)">
              -
            </button>

            {{item.qty}}

            <button class="btn btn-sm btn-outline-secondary" (click)="increase(item)">
              +
            </button>
            <button class="btn btn-danger btn-sm" (click)="remove(item)">
              🗑
            </button>
          </div>

        </div>

      </div>

      <div class="modal-footer">

        <h5 class="me-auto" *ngFor="let item of cartService.getCart()">
            จำนวนรวม {{cartService.getTotalQty()}} รายการ
        </h5>
        <h5 class="me-auto">
          รวม {{cartService.getTotal()}} บาท
        </h5>

        <button class="btn btn-success" (click)="checkout()">
          สั่งซื้อสินค้า
        </button>

      </div>

    </div>
  </div>
</div>
