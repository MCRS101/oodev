<div class="container">
    <div class="card">
        <a routerLink="/home" class="back-home">กลับไปยังหน้าหลัก</a>

        <div class="profile-header">
            <div class="avatar-container">
                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="avatar" alt="User Avatar" />
            </div>
            <div class="profile-title">
                <h3>โปรไฟล์ส่วนตัว</h3>
                <p>จัดการข้อมูลส่วนตัวและที่อยู่สำหรับจัดส่ง</p>
            </div>
        </div>

        <form>
            <div class="form-group">
                <label>ชื่อผู้ใช้งาน <span class="asterisk">*</span></label>
                <input type="text" [value]="user?.name" [(ngModel)]="user.name" name="name" />
                <div class="helper-text"></div>
            </div>

            <div class="row">
                <div class="col">
                    <label>อีเมล<span class="asterisk">*</span></label>
                    <input type="email" [value]="user?.email || ''" placeholder="example@gmail.com" readonly />
                    <div class="helper-text">อีเมลใช้สำหรับเข้าสู่ระบบ ไม่สามารถเปลี่ยนได้</div>
                </div>
                <div class="col">
                    <label>เบอร์โทรศัพท์ <span class="asterisk">*</span></label>
                    <input type="text" [value]="user?.phone || ''"placeholder="09X-XXX-XXXX"  [(ngModel)]="user.phone" name="phone" />
                </div>
            </div>

            <div class="form-group">
                <label>ที่อยู่จัดส่งสินค้า <span class="asterisk">*</span></label>
                <textarea rows="2"
                    [value]="user?.location || ''" placeholder="บ้านเลขที่, หมู่, ซอย, ถนน, ตำบล/แขวง, อำเภอเขต, จังหวัด, รหัสไปรษณีย์ " [(ngModel)]="user.location" name="location"></textarea>
            </div>

            <div class="buttons">
                
                <button type="button" class="save" (click)="saveProfile()">บันทึกข้อมูล</button>
            </div>
        </form>
    </div>
</div>
